<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zsearch</title>
</head>
<style>
    body {
        background-color: rgb(88, 88, 88);
        color:#ffffff;
        font-family: Arial;
        text-align: center;
    }
    p {
        color: white;
        margin-top: 20px;
    }
    h1 {
        margin-top:20px;
    }
    .container {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        height: 100vh;
        padding-top: 80px
    }
    input[type="text"] {
        width: 300px;
        padding: 12px 20px;
        border-radius: 999px;
        border: 1px solid #ccc;
        outline: none;
        border: none;
        font-size: 16px;


    }
 
        

       
      
    
    img {
        width: 550px;
        height: auto;
        display: block;
    }
    .search-box {
        display: flex;
        align-items: center;
        gap: 10px;
    }

</style>
<body>
    <form action="https://www.google.com/search" method="GET" target="_blank">
        <div class="container">
            <img src="logo.png" alt="oops image failed to load :(">
            <p>Search engine by google.</p>
            <input type="text" name="q" placeholder="Type here">
        </div>
    </form>
    
    
</body>
</html>
